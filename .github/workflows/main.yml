name: Build Wupex APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: wupex-expo/package.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install packages
        working-directory: wupex-expo
        run: npm install

      - name: Build APK
        working-directory: wupex-expo
        run: eas build --platform android --profile preview --non-interactive

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: wupex-apk
          path: "*.apk"
          retention-days: 30
